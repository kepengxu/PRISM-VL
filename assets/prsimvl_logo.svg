<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PRSIMVL mark</title>
  <desc id="desc">A clean sensor aperture and prism mark for measurement-grounded vision-language learning.</desc>
